<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数据看板 — 整商 & B端KPI</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- 配置弹窗 -->
<div id="config-overlay" class="overlay hidden">
  <div class="modal">
    <h2>Settings 仓库配置</h2>
    <p class="subtitle">填写 GitHub 仓库信息，数据将存储在此仓库中</p>
    <div class="form-group">
      <label>仓库所属</label>
      <input id="cfg-owner" placeholder="your-github-username" />
    </div>
    <div class="form-group">
      <label>仓库名称</label>
      <input id="cfg-repo" placeholder="my-dashboard-data" />
    </div>
    <div class="form-group">
      <label>分支</label>
      <input id="cfg-branch" value="main" />
    </div>
    <div class="form-group">
      <label>GitHub Token（需 repo 权限）</label>
      <input id="cfg-token" type="password" placeholder="ghp_xxxx" />
    </div>
    <button id="btn-save-config" class="btn btn-primary">Save</button>
  </div>
</div>

<!-- 整体布局 -->
<div class="app-layout">

  <!-- 左侧导航 -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="logo">📊</span>
      <span>数据看板</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item active" data-panel="panel1">
        <span class="nav-icon">📊</span>
        <span class="nav-label">整商面板</span>
      </div>
      <div class="nav-parent" data-panel="panel2">
        <span class="nav-icon">🎯</span>
        <span class="nav-label">B端KPI面板</span>
        <span class="nav-arrow">▸</span>
      </div>
      <div class="nav-children collapsed">
        <div class="nav-sub-item" data-panel="panel2" data-kpi="new-sign">
          <span class="nav-label">新签</span>
        </div>
        <div class="nav-sub-item" data-panel="panel2" data-kpi="boom">
          <span class="nav-label">爆单</span>
        </div>
        <div class="nav-sub-item" data-panel="panel2" data-kpi="surge">
          <span class="nav-label">超抢手</span>
        </div>
      </div>
    </nav>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-section-header">
        <span>📁 数据文件</span>
        <button id="btn-refresh-files" class="btn-icon" title="refresh">🔄</button>
      </div>
      <div id="file-list" class="file-list">
        <div class="empty-tip">请先配置仓库</div>
      </div>
    </div>
  </aside>

  <!-- 主内容 -->
  <main class="main-content">
    <header class="topbar">
      <h1 id="panel-title">整商面板</h1>
      <div class="topbar-actions">
        <button id="btn-show-upload" class="btn btn-accent">+ 上传 Excel</button>
        <button id="btn-show-config" class="btn btn-ghost">Settings</button>
      </div>
    </header>
    <div id="load-progress" class="load-progress hidden">
      <div class="progress-bar"><div id="load-progress-fill" class="progress-fill"></div></div>
      <span id="load-progress-text">加载中...</span>
    </div>
    <div id="panel-content" class="panel-content">
      <div class="placeholder-block">请先在左上角配置仓库信息（Settings），然后上传 Excel 文件</div>
    </div>
  </main>

</div>

<!-- 上传弹窗 -->
<div id="upload-overlay" class="overlay hidden">
  <div class="modal">
    <h2>Upload Excel</h2>
    <div id="upload-area" class="upload-area">
      <input type="file" id="file-input" accept=".xlsx,.xls" hidden />
      <div class="upload-icon">📄</div>
      <p>Click or drag .xlsx file here</p>
      <span class="hint">上传到 GitHub 仓库 data/ 目录</span>
    </div>
    <div id="upload-progress" class="hidden">
      <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
      <p id="progress-text"></p>
    </div>
    <div class="modal-actions">
      <button id="btn-cancel-upload" class="btn btn-ghost">Cancel</button>
      <button id="btn-confirm-upload" class="btn btn-primary" disabled>Upload</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="js/config.js?v=4"></script>
<script src="js/data.js?v=4"></script>
<script src="js/render.js?v=4"></script>
<script src="js/app.js?v=4"></script>
</body>
</html>
